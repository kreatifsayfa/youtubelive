# Nixpacks Configuration for YouTube Live Streamer
# Optimized for Dokploy deployment

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "ffmpeg-full"]

[phases.install]
cmds = [
  "pip3 install --no-cache-dir --break-system-packages -r requirements.txt"
]

[phases.build]
cmds = ["mkdir -p uploads"]

[start]
# Single worker: avoids the autostart firing in multiple workers (duplicate
# streams) and keeps the in-memory stream registry consistent for the UI.
# Threads still give plenty of HTTP concurrency for this control panel.
cmd = "python3.12 -m gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 600 --graceful-timeout 30 app:app"

[variables]
PORT = "5000"
PYTHONUNBUFFERED = "1"
# Auto-start a preconfigured stream after deploy. URL/quality aren't secret so
# they live here; the STREAM KEY must NOT be committed to this PUBLIC repo —
# set AUTOSTART_YOUTUBE_KEY (and optional AUTOSTART_TIKTOK_URL /
# AUTOSTART_TIKTOK_KEY) as environment variables in Dokploy instead.
AUTOSTART_ENABLED = "true"
AUTOSTART_YOUTUBE_URL = "https://www.youtube.com/watch?v=bNY8a2BB5Gc"
AUTOSTART_QUALITY = "1080p"
