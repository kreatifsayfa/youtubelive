# Nixpacks Configuration for YouTube Live Streamer
# Optimized for Dokploy deployment

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "ffmpeg-full"]

[phases.install]
cmds = [
  "pip3 install --no-cache-dir --break-system-packages -r requirements.txt"
]

[phases.build]
cmds = ["mkdir -p uploads"]

[start]
cmd = "python3.12 -m gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 600 --graceful-timeout 30 app:app"

[variables]
PORT = "5000"
PYTHONUNBUFFERED = "1"
